# docker compose -p oracle -f oracle-11g.yml up -d
services:
  oracle_11g:
    image: turingears/oracle-xe-11g:v2
    container_name: oracle_11g
    environment:
      - TZ=Asia/Shanghai
      - ORACLE_PASSWORD=123456
    volumes:
      - ./volumes/oracle/data:/data/oracle
    ports:
      - 1521:1521
    privileged: true
    user: root
    #restart: always
    command: /bin/bash -c "ln -s $ORACLE_HOME/bin/sqlplus /usr/bin"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 500M
    networks:
      application:
        aliases:
          -  net-oracle_11g


networks:
  application:
   name: net
   driver: bridge